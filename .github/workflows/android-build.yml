name: Build Universal Master APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd mobile-app
          npm install --no-package-lock

      - name: Build Web Assets
        run: |
          cd mobile-app
          echo '{"defaultApiUrl":"https://timeattendance-system.onrender.com/api","defaultTenantId":"MASTER_UNIVERSAL","version":"1.0.6","buildDate":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > src/app_config.json
          npm run build

      - name: Sync Capacitor
        run: |
          cd mobile-app
          npx cap sync android

      - name: Build Android APK
        run: |
          cd mobile-app/android
          chmod +x gradlew
          ./gradlew clean assembleDebug

      - name: Deploy APK to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p final-apk/apks
          cp mobile-app/android/app/build/outputs/apk/debug/app-debug.apk final-apk/apks/TimeKey_Master.apk
          cd final-apk
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git checkout -b gh-pages
          git add apks/TimeKey_Master.apk
          git commit -m "Cloud Build: Updated Master APK (V1.0.6)"
          git push origin gh-pages --force
