name: Build & Deploy All (SaaS Cloud)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Apply Rule 6: Use stable environment and avoid conflicting flags
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Node.js (Match Local v20.11.1)
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'

      - name: Install All Dependencies
        run: |
          # Use clean installs to ensure stability
          cd mobile-app && npm install --no-package-lock
          cd ../web-admin && npm install --no-package-lock
          cd ../web-dev && npm install --no-package-lock

      - name: Build Web Admin
        run: |
          cd web-admin
          npm run build

      - name: Build Web Dev
        run: |
          cd web-dev
          npm run build

      - name: Build Mobile APK (Universal)
        run: |
          cd mobile-app
          
          # Auto-increment versioning based on GitHub Run Number
          VERSION="1.1.${{ github.run_number }}"
          VERSION_CODE="${{ github.run_number }}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          echo "[VERSIONING] Setting version to $VERSION ($VERSION_CODE)"
          
          # Update app_config.json with production settings and NEW version
          node -e "const fs=require('fs'); const c=JSON.parse(fs.readFileSync('src/app_config.json')); c.defaultApiUrl='https://timeattendance-system.onrender.com/api'; c.defaultTenantId='MASTER_UNIVERSAL'; c.version='$VERSION'; c.versionCode='$VERSION_CODE'; c.buildDate='$BUILD_DATE'; fs.writeFileSync('src/app_config.json', JSON.stringify(c, null, 2));"
          
          npm run build
          npx cap sync android
          cd android && chmod +x gradlew && ./gradlew clean assembleDebug

      - name: Prepare Final Package
        run: |
          mkdir -p final-deploy/dev
          mkdir -p final-deploy/app
          mkdir -p final-deploy/apks
          
          # Generate Update Metadata for Mobile App Sync
          VERSION="1.1.${{ github.run_number }}"
          VERSION_CODE="${{ github.run_number }}"
          echo "{\"version\":\"$VERSION\",\"versionCode\":\"$VERSION_CODE\",\"notes\":\"Production Release Build ${{ github.run_number }}: Optimization and synchronization fix.\",\"downloadUrl\":\"https://bosslouie5.github.io/TimeAttendance-System/apks/TimeKey_Master.apk\"}" > final-deploy/apks/latest-version.json
          
          # Verify builds before copying
          if [ -d "web-admin/dist" ]; then cp -r web-admin/dist/* final-deploy/; fi
          if [ -d "web-dev/dist" ]; then cp -r web-dev/dist/* final-deploy/dev/; fi
          if [ -d "mobile-app/dist" ]; then cp -r mobile-app/dist/* final-deploy/app/; fi
          
          APK_PATH="mobile-app/android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" final-deploy/apks/TimeKey_Master.apk
          fi
          
          echo "Last Deploy: $(date)" > final-deploy/version.txt
          echo "Build Version: ${{ github.sha }}" >> final-deploy/version.txt
          echo "App Version: $VERSION ($VERSION_CODE)" >> final-deploy/version.txt

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: final-deploy/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
