name: Build & Deploy All (SaaS Cloud)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install All Dependencies
        run: |
          cd mobile-app && npm install --no-package-lock
          cd ../web-admin && npm install --no-package-lock
          cd ../web-dev && npm install --no-package-lock

      - name: Build Web Admin
        run: |
          cd web-admin
          npm run build

      - name: Build Web Dev
        run: |
          cd web-dev
          npm run build

      - name: Build Mobile APK (Universal)
        run: |
          cd mobile-app
          # Keep the version from laptop but set production URLs
          node -e "const fs=require('fs'); const c=JSON.parse(fs.readFileSync('src/app_config.json')); c.defaultApiUrl='https://timeattendance-system.onrender.com/api'; c.defaultTenantId='MASTER_UNIVERSAL'; fs.writeFileSync('src/app_config.json', JSON.stringify(c, null, 2));"
          npm run build
          npx cap sync android
          cd android && chmod +x gradlew && ./gradlew clean assembleDebug

      - name: Prepare Final Package
        run: |
          mkdir -p final-deploy/dev
          mkdir -p final-deploy/app
          mkdir -p final-deploy/apks
          cp -r web-admin/dist/* final-deploy/
          cp -r web-dev/dist/* final-deploy/dev/
          cp -r mobile-app/dist/* final-deploy/app/
          cp mobile-app/android/app/build/outputs/apk/debug/app-debug.apk final-deploy/apks/TimeKey_Master.apk
          echo "Last Deploy: $(date)" > final-deploy/version.txt

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: final-deploy/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
