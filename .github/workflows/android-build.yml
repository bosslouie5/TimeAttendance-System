name: Build & Deploy All (SaaS Cloud)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Removed environment block temporarily to use standard deployment flow

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install All Dependencies
        run: |
          cd mobile-app && npm install --no-package-lock
          cd ../web-admin && npm install --no-package-lock
          cd ../web-dev && npm install --no-package-lock

      - name: Build Web Admin
        run: |
          cd web-admin
          npm run build

      - name: Build Web Dev
        run: |
          cd web-dev
          npm run build

      - name: Build Mobile APK (Universal)
        run: |
          cd mobile-app
          echo '{"defaultApiUrl":"https://timeattendance-system.onrender.com/api","defaultTenantId":"MASTER_UNIVERSAL","version":"1.0.7","buildDate":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > src/app_config.json
          npm run build
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug

      - name: Prepare Final Package
        run: |
          mkdir -p final-deploy/dev
          mkdir -p final-deploy/app
          mkdir -p final-deploy/apks
          cp -r web-admin/dist/* final-deploy/
          cp -r web-dev/dist/* final-deploy/dev/
          cp -r mobile-app/dist/* final-deploy/app/
          cp mobile-app/android/app/build/outputs/apk/debug/app-debug.apk final-deploy/apks/TimeKey_Master.apk

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./final-deploy
          force_orphan: true
